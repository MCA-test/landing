<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCA Official</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; line-height: 1.6; color: #333; background-color: #fafafa; }
        section { min-height: 80vh; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 2rem; border-bottom: 1px solid #eaeaea; }
        .hero { background: #1a1a1a; color: #ffffff; text-align: center; }
        .content-box { width: 100%; max-width: 800px; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; text-align: center; }
        h1 { font-size: 3.5rem; margin-bottom: 1rem; letter-spacing: -0.02em; }
        h2 { font-size: 2rem; margin-bottom: 1rem; color: #1a1a1a; }
        p { font-size: 1.1rem; color: #666; word-break: keep-all; }
        .hero p { color: #cccccc; }
        footer { padding: 50px 20px; text-align: center; background: #1a1a1a; color: #888; }
        /* 방문자 카운터 스타일 */
        .counter-wrapper { margin-top: 30px; display: inline-block; background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 8px; }
        .counter-wrapper img { vertical-align: middle; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 data-aos="fade-down">MCA</h1>
        <p data-aos="fade-up" data-aos-delay="300">신뢰할 수 있는 글로벌 파트너, 최상의 솔루션을 제공합니다.</p>
    </section>

    <section>
        <div class="content-box" data-aos="fade-right">
            <h2>Premium Imports</h2>
            <p>엄격한 기준으로 선별된 스페인 최상급 올리브오일 등 프리미엄 브랜드를 국내에 선보입니다.</p>
        </div>
        <div class="content-box" data-aos="fade-left">
            <h2>Advanced Technology</h2>
            <p>Alphascope를 비롯한 글로벌 첨단 산업 장비의 한국 총판으로서 전문적인 기술 지원을 약속드립니다.</p>
        </div>
    </section>

    <footer>
        <p>© 2026 MCA. All rights reserved.</p>
        <div class="counter-wrapper">
            <a href="https://hits.seeyoufarm.com">
                <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fmca-test.github.io%2F&count_bg=%231A1A1A&title_bg=%23333333&icon=&icon_color=%23E7E7E7&title=Visitors&edge_flat=false" alt="Hits"/>
            </a>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1200, // 애니메이션이 조금 더 부드럽게 보이도록 1.2초로 조정
            once: false     // 스크롤을 위아래로 움직일 때마다 효과 반복
        });
    </script>
</body>
</html>
